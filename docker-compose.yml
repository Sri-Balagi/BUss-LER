version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://bizos:bizos@postgres:5432/bizos
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - LOG_LEVEL=INFO
    depends_on:
      - postgres
      - redis
      - vector-db
    networks:
      - bizos-net

  worker:
    build: .
    command: ["celery", "-A", "app.runtime.distributed.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://bizos:bizos@postgres:5432/bizos
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - vector-db
    networks:
      - bizos-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bizos
      POSTGRES_PASSWORD: bizos
      POSTGRES_DB: bizos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bizos-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bizos-net
      
  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - bizos-net

networks:
  bizos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
