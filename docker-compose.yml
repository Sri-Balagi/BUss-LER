version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://bizos:bizos@postgres:5432/bizos
      - LOG_LEVEL=INFO
    depends_on:
      - postgres
      - redis
    networks:
      - bizos-net

  worker:
    build: .
    command: ["python", "-m", "app.infrastructure.workers.runner"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://bizos:bizos@postgres:5432/bizos
    depends_on:
      - postgres
      - redis
    networks:
      - bizos-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bizos
      POSTGRES_PASSWORD: bizos
      POSTGRES_DB: bizos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bizos-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bizos-net
      
  vector-db:
    image: milvusdb/milvus:v2.3.0
    ports:
      - "19530:19530"
    networks:
      - bizos-net

networks:
  bizos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
