
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bizos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bizos}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    networks:
      - bizos-net

  worker:
    build: .
    command: ["celery", "-A", "app.runtime.distributed.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bizos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bizos}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    networks:
      - bizos-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-bizos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizos} -d ${POSTGRES_DB:-bizos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bizos-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bizos-net
      
  vector-db:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bizos-net

networks:
  bizos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
