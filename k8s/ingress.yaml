apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bizos-ingress
  namespace: bizos-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: api.bizos.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bizos-api-svc
            port:
              number: 80
