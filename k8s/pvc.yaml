apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bizos-postgres-pvc
  namespace: bizos-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bizos-redis-pvc
  namespace: bizos-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
