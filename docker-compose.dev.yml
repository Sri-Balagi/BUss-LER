# BizOS Development Compose
# Usage: docker-compose -f docker-compose.dev.yml up
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bizos-api-dev
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # Hot reload
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - QDRANT_HOST=qdrant
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bizos-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  qdrant_dev_data:
